# Netlify build configuration for this Vite + React app.
[build]
  command = "npm run build"
  publish = "dist"

# Single-page-app fallback: serve index.html for any unknown path so client
# state (e.g. an open detail view) survives a refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
